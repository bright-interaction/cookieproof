services:
  web:
    build: .
    restart: unless-stopped
    # No host port exposure — traffic is routed by dockyard-proxy-caddy
    # via the dockyard-proxy external network.
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # Security: Read-only filesystem with minimal writable dirs
    read_only: true
    tmpfs:
      - /tmp:size=16M,mode=1777,noexec,nosuid,nodev
      - /var/cache/nginx:size=32M,mode=755
      - /var/run:size=1M,mode=755
    # Security: Drop all capabilities (no longer needs NET_BIND_SERVICE with port 8080)
    cap_drop:
      - ALL
    # Security: Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    # Security: Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    networks:
      - internal
      - dockyard-proxy

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      - gotenberg
      # Uncomment when ready to switch to Postgres:
      # postgres:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    environment:
      - NODE_ENV=production
      - API_KEY=${COOKIEPROOF_API_KEY:-}
      - COOKIEPROOF_LICENSE_KEY=${COOKIEPROOF_LICENSE_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://brightinteraction.com,https://www.brightinteraction.com,https://consent.brightinteraction.com}
      - RETENTION_DAYS=${RETENTION_DAYS:-1095}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - GOTENBERG_URL=${GOTENBERG_URL:-http://gotenberg:3000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ALERT_CHECK_INTERVAL_HOURS=${ALERT_CHECK_INTERVAL_HOURS:-6}
      - ALERT_EMAIL_ENABLED=${ALERT_EMAIL_ENABLED:-true}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM=${RESEND_FROM:-}
      # Database selection (sqlite or postgres)
      - DB_TYPE=${DB_TYPE:-sqlite}
      # Postgres connection (when DB_TYPE=postgres)
      - DATABASE_URL=${DATABASE_URL:-}
      - PGHOST=${PGHOST:-postgres}
      - PGPORT=${PGPORT:-5432}
      - PGUSER=${PGUSER:-cookieproof}
      - PGPASSWORD=${PGPASSWORD:-}
      - PGDATABASE=${PGDATABASE:-cookieproof}
    volumes:
      - cookieproof-data:/data
    networks:
      - internal
    # Security: Read-only root filesystem (except /data)
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777,noexec,nosuid,nodev
    # Security: Drop all capabilities except those needed
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    # Security: Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    # Security: Resource limits to prevent DoS
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # PostgreSQL - Ready for production scale (uncomment when ready)
  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_USER=${PGUSER:-cookieproof}
  #     - POSTGRES_PASSWORD=${PGPASSWORD:?PGPASSWORD is required}
  #     - POSTGRES_DB=${PGDATABASE:-cookieproof}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #     - ./api/schema.postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U cookieproof -d cookieproof"]
  #     interval: 10s
  #     timeout: 5s
  #     start_period: 30s
  #     retries: 5
  #   networks:
  #     - internal
  #   # Security: Resource limits
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #       reservations:
  #         memory: 128M

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    networks:
      - internal
    # Security: Gotenberg hardening
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Security: Resource limits to prevent DoS
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

volumes:
  cookieproof-data:
    name: consentproof_proof-data
    # Note: For encryption at rest, use Docker's encrypted volumes
    # or host-level encryption (LUKS, dm-crypt, etc.)
  # postgres-data:
  #   name: cookieproof_postgres-data

networks:
  internal:
  dockyard-proxy:
    external: true
