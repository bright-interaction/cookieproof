server {
    listen 8080;
    server_name consent.brightinteraction.com;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: Enhanced with frame-ancestors, base-uri, form-action for XSS protection
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://consent.brightinteraction.com; img-src 'self' data: blob:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # Cross-Origin isolation headers for defense-in-depth
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Configurator as root
    location / {
        try_files /configurator/index.html =404;
    }

    # API proxy to Bun server
    location /api/ {
        proxy_pass http://api:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;

        # Allow branding logo uploads (~500KB base64) while capping abuse
        client_max_body_size 1m;
    }

    # Block source maps and build artifacts from being served publicly
    location ~ \.(map|sri)$ {
        return 404;
    }

    # Serve dist files for CDN usage
    location /dist/ {
        add_header Access-Control-Allow-Origin "*";
        # 5-minute TTL — filenames are not content-hashed, keep short for update propagation
        add_header Cache-Control "public, max-age=300" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://consent.brightinteraction.com; img-src 'self' data: blob:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        # Note: COOP/CORP set to cross-origin for CDN resources
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        try_files $uri =404;
    }

    # Loader script — served with CORS for cross-origin embedding
    location = /loader.js {
        alias /usr/share/nginx/html/configurator/loader.min.js;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=300" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # Configurator assets
    location /configurator/ {
        try_files $uri =404;
    }

    # Demo page
    location /demo/ {
        try_files $uri $uri/index.html =404;
    }

    # Health check
    location /health {
        default_type text/plain;
        return 200 "ok\n";
    }
}
